
name: Pylint CI for dev

# ТРИГГЕРЫ - ЭТО САМОЕ ВАЖНОЕ!
on:
  # 1. При пуше в ветку dev
  push:
    branches: [ dev ]
  
  # 2. При создании pull request в ветку dev
  pull_request:
    branches: [ dev ]

jobs:
  pylint:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pylint
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      
      - name: Run Pylint
        run: |
          # Ищем все Python файлы и проверяем
          find . -name "*.py" -not -path "./.github/*" | xargs pylint --exit-zero --output=lint.txt || true
      
      - name: Upload lint report
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: lint.txt
