# Версия формата Docker Compose (3.8 - стабильная версия)
version: '3.8'

# Определяем сервисы (контейнеры), которые будут запущены
services:

  # ============================================
  # МИКРОСЕРВИС 1: User Service (Пользователи)
  # ============================================
  user-service:
    # Путь к папке с Dockerfile и кодом сервиса
    build: ./user-service

    # Имя контейнера (удобно для управления)
    container_name: user-service

    # Проброс портов: "порт_хоста:порт_контейнера"
    # Порт 5001 на вашем компьютере → порт 5001 внутри контейнера
    ports:
      - "5001:5001"

    # Сеть для общения между контейнерами
    networks:
      - app-network

    # Политика перезапуска:
    # unless-stopped - перезапускать, если упал, но не если остановили вручную
    restart: unless-stopped

  # ============================================
  # МИКРОСЕРВИС 2: Order Service (Заказы)
  # ============================================
  order-service:
    # Путь к папке с Dockerfile и кодом сервиса
    build: ./order-service

    # Имя контейнера
    container_name: order-service

    # Проброс портов: порт 5002 на хосте → порт 5002 в контейнере
    ports:
      - "5002:5002"

    # Переменные окружения для контейнера
    # USER_SERVICE_URL - адрес, по которому order-service будет обращаться к user-service
    environment:
      - USER_SERVICE_URL=http://user-service:5001

    # Сеть для общения между контейнерами (должна быть та же, что у user-service)
    networks:
      - app-network

    # Зависимости: order-service запустится ТОЛЬКО после user-service
    depends_on:
      - user-service

    # Политика перезапуска
    restart: unless-stopped

# ============================================
# НАСТРОЙКА СЕТИ
# ============================================
# Создаем изолированную сеть для общения микросервисов
# Контейнеры в этой сети видят друг друга по имени сервиса
networks:
  app-network:
    # driver: bridge - стандартный тип сети для одного хоста
    driver: bridge