events {
    worker_connections 1024;
}

http {
    # ================================================
    # НАСТРОЙКА БАЛАНСИРОВКИ НАГРУЗКИ ДЛЯ USER-SERVICE
    # ================================================
    upstream user_service_backend {
        # least_conn - отправляем запрос на сервер с наименьшим числом соединений
        least_conn;

        # Список серверов (реплик) для балансировки
        # user-service:5001 - имя сервиса в Swarm и порт
        server user-service:5001;
        # Можно добавить несколько реплик (Swarm сделает это автоматически)
    }

    # ================================================
    # НАСТРОЙКА БАЛАНСИРОВКИ НАГРУЗКИ ДЛЯ ORDER-SERVICE
    # ================================================
    upstream order_service_backend {
        least_conn;
        server order-service:5002;
    }

    # ================================================
    # ОСНОВНОЙ СЕРВЕР NGINX (слушает входящие запросы)
    # ================================================
    server {
        # Слушаем порт 80 (стандартный HTTP порт)
        listen 80;

        # Имя сервера (можно заменить на ваш домен)
        server_name localhost;

        # ================================================
        # МАРШРУТИЗАЦИЯ ЗАПРОСОВ
        # ================================================

        # Все запросы на /users/* перенаправляются в user-service
        location /users {
            proxy_pass http://user_service_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Все запросы на /orders/* перенаправляются в order-service
        location /orders {
            proxy_pass http://order_service_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Health check для NGINX
        location /health {
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # Корневой путь - информационная страница
        location / {
            return 200 "Microservices Gateway\n";
            add_header Content-Type text/plain;
        }
    }
}
